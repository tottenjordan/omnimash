name: CI

on:
  pull_request:
    branches: [cc-work, main]
  push:
    branches: [cc-work, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # OmniMash resolves dependencies from a private Google Artifact Registry
      # (see the registry source in uv.lock). Authenticate so `uv sync` can read
      # it. Configure these repository secrets (Workload Identity Federation):
      #   ARTIFACT_REGISTRY_WIF_PROVIDER  - full WIF provider resource name
      #   ARTIFACT_REGISTRY_SERVICE_ACCOUNT - service account email with reader access
      - name: Authenticate to Google Cloud
        if: ${{ secrets.ARTIFACT_REGISTRY_WIF_PROVIDER != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.ARTIFACT_REGISTRY_WIF_PROVIDER }}
          service_account: ${{ secrets.ARTIFACT_REGISTRY_SERVICE_ACCOUNT }}

      - name: Configure Artifact Registry credentials for uv
        if: ${{ secrets.ARTIFACT_REGISTRY_WIF_PROVIDER != '' }}
        run: |
          # uv honors ~/.netrc for index authentication.
          printf 'machine us-python.pkg.dev login oauth2accesstoken password %s\n' \
            "$(gcloud auth print-access-token)" > "$HOME/.netrc"
          chmod 600 "$HOME/.netrc"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run ty check src/

      - name: Run tests
        run: uv run pytest
